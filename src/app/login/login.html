<mat-card class="login-card">
    <mat-card-header>
        <h1>Prijavite se</h1>
    </mat-card-header>

    <mat-card-content>
        <div>
            <mat-form-field class="full-width">
                <mat-label>Email adresa</mat-label>
                <input matInput type="email" [(ngModel)]="email">
            </mat-form-field>

            <mat-form-field class="full-width">
                <mat-label>Lozinka</mat-label>
                <input matInput type="password" [(ngModel)]="password">
            </mat-form-field>
        </div>
    </mat-card-content>


    <mat-card-actions>
        <button type="button" matButton (click)="doLogin()">
            <mat-icon fontIcon="login" />Prijavite se
        </button>
        <a routerLink="/signup" matButton>
            <mat-icon fontIcon="send" /> Registrujte se
        </a>
    </mat-card-actions>

</mat-card>
