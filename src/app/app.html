<mat-toolbar color="primary">
    <span>
        AM² - 2026
    </span>
    <span class="spacer"></span>

    <a routerLink="/" matButton>
        <mat-icon fontIcon="home" />Naslovna
    </a>
    <a routerLink="/about" matButton>
        <mat-icon fontIcon="info" />O Projektu
    </a>

    @if (authService.getActiveUser()) {
    <a routerLink="/cart" matButton>
        <mat-icon fontIcon="shopping_cart" />Korpa
    </a>

    <a routerLink="/user" matButton>
        <mat-icon fontIcon="admin_panel_settings" />Moj Nalog
    </a>
    <button type="button" matButton (click)="doLogout()">
        <mat-icon fontIcon="logout" />Odjavite se
    </button>
    }
    @else {
    <a routerLink="/login" matButton>
        <mat-icon fontIcon="login" />Prijavite se
    </a>
    }

    <div class="mobile-nav">
        <button matIconButton [matMenuTriggerFor]="menu">
            <mat-icon>more_vert</mat-icon>
        </button>
        <mat-menu #menu="matMenu">
            <a routerLink="/" mat-menu-item>
                <mat-icon fontIcon="home" /> Naslovna
            </a>
            <a routerLink="/about" mat-menu-item>
                <mat-icon fontIcon="info" /> O Projektu
            </a>
            @if(authService.getActiveUser()) {
            <a routerLink="/cart" mat-menu-item>
                <mat-icon fontIcon="shopping_cart" /> Korpa
            </a>

            <a routerLink="/user" mat-menu-item>
                <mat-icon fontIcon="admin_panel_settings" /> Moj Nalog
            </a>
            <button mat-menu-item (click)="doLogout()">
                <mat-icon fontIcon="logout" /> Odjavite se
            </button>
            } @else {
            <a routerLink="/login" mat-menu-item>
                <mat-icon fontIcon="login" /> Prijavite se
            </a>
            }
        </mat-menu>
    </div>
</mat-toolbar>

<div class="wrapper">
    <router-outlet />
</div>

&nbsp;
<footer class="text-center mt-10">
    &copy; {{year}} | Univerzitet Singidunum - Tehnički fakultet
</footer>
